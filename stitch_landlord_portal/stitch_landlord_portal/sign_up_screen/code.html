<body class="bg-background font-body text-on-background antialiased overflow-x-hidden">
<!-- Auth Shell Wrapper: Using Tonal Layering Instead of Borders -->
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Branding Section (Asymmetric Hero) -->
<section class="relative w-full md:w-[45%] lg:w-1/2 bg-primary-container p-8 md:p-16 flex flex-col justify-between overflow-hidden">
<!-- Subtle Adire Overlay -->
<div class="absolute inset-0 adire-pattern pointer-events-none"></div>
<!-- Shared Component: TopAppBar logic applied locally -->
<div class="relative z-10 flex items-center gap-2">
<span class="text-tertiary-fixed font-black tracking-widest text-xl font-headline uppercase">AVENUE SCHOLAR</span>
</div>
<!-- Hero Image with Editorial Overlap -->
<div class="relative z-10 mt-12 md:mt-0">
<div class="relative w-full aspect-[4/5] rounded-xl overflow-hidden shadow-2xl transform rotate-1 md:-rotate-2">
<img alt="Contemporary Nigerian Architecture" class="w-full h-full object-cover" data-alt="Modern geometric Nigerian apartment building with warm wood accents and terracotta walls under a soft evening sun" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAAJk3CjzSWrN4gHiaFpVAuA1_kDs25yhwnzmpZKjh7oYoZl_envPyKWI_W2aZeJb08jANqJTGAVzHGSu0h8odoUjNRKamx5gnxY12w6z3uuItto-raY7atXxGT8F-puIrzVU4yn_iJoBba6ZGxjRzTjFeJQO4qdCDvD6PWaNqfnrvLYQ3ab7kL7RIdww4u32bv8jaCjqmM71j1dC0i23mSv2vhakzEdlQ6AXCobVgjsUcf5s0c55tCwec3UxRpFDuWM5Z0HfGxbwwk"/>

</div>
<div class="absolute -bottom-8 -right-4 md:-right-12 bg-tertiary-container p-6 rounded-xl shadow-xl max-w-xs transform rotate-3">
<p class="text-on-tertiary-container font-headline font-extrabold text-lg leading-tight italic">
                        "Redefining the student lifestyle in Nigeria's vibrant cities."
                    </p>
</div>
</div>
<div class="relative z-10 hidden md:block">
<p class="text-on-primary-container font-label text-xs uppercase tracking-[0.2em] opacity-80">
                    Est. 2024 • Premium Student Curation
                </p>
</div>
</section>
<!-- Form Section -->
<section class="w-full md:w-[55%] lg:w-1/2 bg-surface p-8 md:p-16 lg:p-24 flex flex-col justify-center">
<div class="max-w-md w-full mx-auto">
<!-- Headline Stack -->
<header class="mb-10">
<h1 class="text-5xl md:text-6xl font-headline font-extrabold text-primary leading-[0.9] tracking-tighter mb-4">
                        Join the Circle
                    </h1>
<p class="text-on-surface-variant text-lg">
                        Create an account to access curated student housing and verified roommate matching.
                    </p>
</header>
<form class="space-y-6">
<!-- Role Selector (Toggle) -->
<div class="bg-surface-container-high p-1.5 rounded-full flex gap-1 items-center">
<button class="flex-1 py-3 px-6 rounded-full text-sm font-headline font-extrabold uppercase tracking-wider bg-primary text-white transition-all" type="button">
                            I am a Student
                        </button>
<button class="flex-1 py-3 px-6 rounded-full text-sm font-headline font-extrabold uppercase tracking-wider text-on-surface-variant hover:bg-surface-container-highest transition-all" type="button">
                            I am a Landlord
                        </button>
</div>
<!-- Input Grid -->
<div class="space-y-4">
<!-- Full Name -->
<div class="group">
<label class="block text-[10px] font-headline font-extrabold uppercase tracking-[0.1em] text-primary mb-1 ml-1">Full Name</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" placeholder="Chidi Adebayo" type="text"/>
</div>
<!-- Email -->
<div class="group">
<label class="block text-[10px] font-headline font-extrabold uppercase tracking-[0.1em] text-primary mb-1 ml-1">Email Address</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" placeholder="chidi@scholar.ng" type="email"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Phone Number -->
<div class="group">
<label class="block text-[10px] font-headline font-extrabold uppercase tracking-[0.1em] text-primary mb-1 ml-1">Phone Number</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" placeholder="+234" type="tel"/>
</div>
<!-- Password -->
<div class="group relative">
<label class="block text-[10px] font-headline font-extrabold uppercase tracking-[0.1em] text-primary mb-1 ml-1">Password</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 bottom-4 text-outline/50 cursor-pointer">visibility</span>
</div>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 px-1">
<input class="mt-1 rounded-sm border-outline-variant text-secondary focus:ring-secondary" type="checkbox"/>
<label class="text-sm text-on-surface-variant leading-tight">
                            I agree to the <a class="text-primary font-bold underline underline-offset-4 decoration-secondary/30" href="#">Terms of Service</a> and <a class="text-primary font-bold underline underline-offset-4 decoration-secondary/30" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- CTA Button -->
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-extrabold text-lg rounded-xl shadow-lg hover:shadow-2xl active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
                        Create Account
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Footer Link -->
<p class="text-center text-on-surface-variant font-medium pt-4">
                        Already have an account? 
                        <a class="text-secondary font-extrabold hover:text-on-secondary-container transition-colors ml-1 underline decoration-secondary/20 underline-offset-8" href="#">
                            Login
                        </a>
</p>
</form>
<!-- Social Proof / Quality Marker -->
<div class="mt-16 flex items-center justify-between opacity-40 grayscale group hover:grayscale-0 hover:opacity-100 transition-all duration-700">
<div class="h-[1px] bg-outline-variant flex-1"></div>
<span class="px-4 text-[10px] font-headline font-extrabold uppercase tracking-[0.2em] whitespace-nowrap">Trusted by 5,000+ Students</span>
<div class="h-[1px] bg-outline-variant flex-1"></div>
</div>
<div class="mt-8 flex justify-center gap-8 opacity-30">

<img alt="Abuja University Logo" class="h-8 grayscale" data-alt="Stylized University of Abuja crest logo in minimalist monochrome" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyrqha26t5Cx3FJONrtuw7JwJ6dWa6GLrOP8W6ffzMucFCMqiyAUr2A2lXkt-gPiYzyzeMks4PYkEoqAPYrmu5zDjdduaovSzS65bXSKWPbtpb9TvHtrh8X6px-gANZAsQYe6P6Nzn2ygONoFfPHaZMCtoqw0_eBPvhbHSwFieCidI5_9HNkaZlSLNLMtgK7tf8cUUYzqzoEXC5vSPm4BM5qz9-fcJ6Vr47r3lJbhG0RdOHiJkwckFVb1UZkUK-Ru_fY78jQuic3YA"/>
</div>
</div>
</section>
</main>
