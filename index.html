<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avenue Scholar Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #00281c;
        --primary-2: #00402e;
        --secondary: #944925;
        --secondary-soft: #ffdbcd;
        --gold: #ffe088;
        --gold-deep: #735c00;
        --bg: #fdf9f3;
        --surface: #ffffff;
        --surface-low: #f7f3ed;
        --surface-high: #ebe8e2;
        --text: #1c1c18;
        --muted: #5f655f;
        --ok: #17503d;
        --ok-soft: #b6efd5;
        --warn: #76320f;
        --shadow: 0 24px 60px rgba(28, 28, 24, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Manrope", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 224, 136, 0.2), transparent 24%),
          linear-gradient(180deg, #fdf9f3 0%, #f3eee8 100%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }

      .app {
        width: min(100%, 1240px);
        margin: 0 auto;
        padding: 0 16px 36px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        background: rgba(0, 40, 28, 0.9);
        color: #fff;
        backdrop-filter: blur(18px);
        border-radius: 0 0 24px 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      }

      .brand-wrap,
      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .icon-btn,
      .nav-pill,
      .ghost-btn,
      .solid-btn,
      .soft-btn {
        border: 0;
      }

      .icon-btn {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
      }

      .brand {
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .nav-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .nav-pill {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .nav-pill.active {
        background: var(--gold);
        color: #2e2300;
      }

      .page {
        padding-top: 22px;
      }

      .hero-grid,
      .split-grid,
      .dashboard-grid,
      .landlord-grid,
      .detail-grid {
        display: grid;
        gap: 22px;
      }

      .hero-grid,
      .detail-grid,
      .dashboard-grid,
      .landlord-grid {
        grid-template-columns: repeat(12, minmax(0, 1fr));
      }

      .panel,
      .card,
      .stat,
      .sheet {
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .panel,
      .sheet {
        padding: 22px;
      }

      .hero-copy {
        grid-column: span 5;
        padding: 26px;
        border-radius: 32px;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
        color: #fff;
        position: relative;
        overflow: hidden;
      }

      .hero-copy::after,
      .pattern::after {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.08;
        background-image:
          radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.8) 1px, transparent 0);
        background-size: 24px 24px;
        pointer-events: none;
      }

      .hero-stage {
        grid-column: span 7;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .hero-title,
      .section-title,
      .screen-title {
        margin: 0;
        letter-spacing: -0.04em;
      }

      .hero-title {
        margin-top: 18px;
        font-size: clamp(2.6rem, 6vw, 4.8rem);
        line-height: 0.95;
      }

      .hero-copy p {
        max-width: 32rem;
        color: rgba(255, 255, 255, 0.78);
        line-height: 1.7;
      }

      .screen-title {
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1;
      }

      .section-title {
        font-size: 1.5rem;
      }

      .hero-actions,
      .toolbar,
      .meta-row,
      .card-actions,
      .input-row,
      .facts,
      .mini-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .solid-btn,
      .ghost-btn,
      .soft-btn {
        padding: 12px 16px;
        border-radius: 14px;
        font-weight: 800;
      }

      .solid-btn {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
        color: #fff;
      }

      .ghost-btn {
        background: var(--surface-high);
        color: var(--text);
      }

      .soft-btn {
        background: var(--secondary-soft);
        color: var(--warn);
      }

      .stage-card {
        min-height: 100%;
        overflow: hidden;
      }

      .stage-image {
        height: 320px;
        width: 100%;
        object-fit: cover;
        display: block;
      }

      .stage-body {
        padding: 20px;
        display: grid;
        gap: 12px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .badge.gold {
        background: var(--gold);
        color: #2f2300;
      }

      .badge.ok {
        background: var(--ok-soft);
        color: var(--ok);
      }

      .badge.warm {
        background: var(--secondary-soft);
        color: var(--warn);
      }

      .muted {
        color: var(--muted);
      }

      .search-shell {
        display: grid;
        gap: 18px;
      }

      .search-row {
        display: flex;
        align-items: center;
        gap: 12px;
        border-radius: 18px;
        background: var(--surface);
        padding: 14px 16px;
      }

      .search-row input,
      .field,
      .auth-field {
        border: 0;
        outline: none;
        width: 100%;
        background: transparent;
        color: var(--text);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        border: 0;
        border-radius: 14px;
        background: var(--surface-low);
        color: var(--text);
        padding: 11px 14px;
        font-weight: 800;
      }

      .chip.active {
        background: #e4f3eb;
        color: var(--ok);
      }

      .cards-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .card {
        overflow: hidden;
      }

      .card-media {
        position: relative;
        height: 250px;
      }

      .card-media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .price-tag {
        position: absolute;
        right: 14px;
        bottom: 14px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.92);
        font-weight: 800;
      }

      .card-body {
        padding: 18px;
        background:
          linear-gradient(45deg, rgba(0, 40, 28, 0.03) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(0, 40, 28, 0.03) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(0, 40, 28, 0.03) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(0, 40, 28, 0.03) 75%),
          #fffcf8;
        background-size: 28px 28px;
        background-position: 0 0, 0 14px, 14px -14px, -14px 0;
      }

      .card-title {
        margin: 0;
        font-size: 1.16rem;
        letter-spacing: -0.03em;
      }

      .facts {
        margin-top: 12px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .fact {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .split-grid {
        grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
        align-items: start;
      }

      .gallery-main {
        height: 460px;
        border-radius: 28px;
        overflow: hidden;
      }

      .gallery-main img,
      .gallery-stack img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .gallery-stack {
        display: grid;
        gap: 16px;
      }

      .gallery-thumb {
        height: 222px;
        border-radius: 24px;
        overflow: hidden;
      }

      .stat {
        padding: 22px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .dashboard-main {
        grid-column: span 8;
        display: grid;
        gap: 20px;
      }

      .dashboard-side {
        grid-column: span 4;
        display: grid;
        gap: 20px;
      }

      .landlord-main {
        grid-column: span 8;
        display: grid;
        gap: 20px;
      }

      .landlord-side {
        grid-column: span 4;
        display: grid;
        gap: 20px;
      }

      .stat-band {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .property-row,
      .list-row,
      .match-card,
      .booking-card {
        padding: 18px;
        border-radius: 22px;
        background: var(--surface-low);
      }

      .property-row {
        display: grid;
        grid-template-columns: 180px minmax(0, 1fr);
        gap: 16px;
      }

      .property-row img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: 20px;
      }

      .list-stack {
        display: grid;
        gap: 14px;
      }

      .auth-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
        min-height: calc(100vh - 136px);
        gap: 22px;
      }

      .auth-visual {
        position: relative;
        overflow: hidden;
        padding: 28px;
        border-radius: 32px;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
        color: #fff;
      }

      .auth-visual img {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 42%;
        height: 85%;
        object-fit: cover;
        border-radius: 28px 0 0 0;
      }

      .auth-card {
        padding: 28px;
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--shadow);
        align-self: center;
      }

      .form-stack {
        display: grid;
        gap: 16px;
      }

      .auth-label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        color: var(--primary);
      }

      .auth-input {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 15px 16px;
        border-radius: 16px;
        background: var(--surface-low);
      }

      .toast-root {
        position: fixed;
        top: 90px;
        right: 16px;
        display: grid;
        gap: 8px;
        z-index: 50;
      }

      .toast {
        background: rgba(28, 28, 24, 0.92);
        color: #fff;
        padding: 10px 12px;
        border-radius: 12px;
        box-shadow: 0 18px 30px rgba(0, 0, 0, 0.18);
      }

      @media (max-width: 1024px) {
        .hero-copy,
        .hero-stage,
        .dashboard-main,
        .dashboard-side,
        .landlord-main,
        .landlord-side {
          grid-column: span 12;
        }

        .cards-grid,
        .stat-band,
        .stats-grid,
        .split-grid,
        .auth-shell {
          grid-template-columns: 1fr;
        }

        .property-row {
          grid-template-columns: 1fr;
        }

        .auth-visual img {
          position: static;
          width: 100%;
          height: 280px;
          margin-top: 22px;
          border-radius: 24px;
        }
      }

      @media (max-width: 720px) {
        .app {
          padding: 0 12px 22px;
        }

        .topbar {
          flex-direction: column;
          align-items: stretch;
          border-radius: 0 0 20px 20px;
        }

        .brand-wrap,
        .topbar-actions {
          justify-content: space-between;
        }

        .cards-grid {
          grid-template-columns: 1fr;
        }

        .stat-band,
        .stats-grid {
          grid-template-columns: 1fr;
        }

        .gallery-main {
          height: 320px;
        }

        .gallery-thumb {
          height: 180px;
        }
      }
    </style>
  </head>

            "A more affordable but still polished shared-living option near campus, with strong roommate matching and simple, reliable comfort.",
          features: ["Shared", "Study Area", "Laundry", "Campus Access"],
          spots: 2
        }
      ];

      const roommates = [
        { id: "r1", name: "Amara O.", school: "Design major", match: 85, note: "Quiet evenings, likes tidy shared kitchens." },
        { id: "r2", name: "Ibrahim K.", school: "Law student", match: 88, note: "Study-heavy routine, early riser, prefers calm weekends." },
        { id: "r3", name: "David E.", school: "Engineering", match: 79, note: "Collaborative, organized, flexible move-in timeline." }
      ];

      function defaultState() {
        return {
          view: "login",
          search: "",
          filters: { area: "All", type: "Any", price: "Any" },
          savedIds: ["l2"],
          bookings: [{ id: "b1", listingId: "l1", slot: "Sat, 18 May - 3:00 PM", status: "Pending" }],
          requestedMatches: ["r1"],
          selectedListingId: "l1",
          profile: {
            name: "Korede A.",
            school: "University of Lagos",
            track: "Undergraduate",
            area: "Lekki or Yaba",
            budget: "NGN 1.2m - 4.5m"
          }
        };
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultState();
          const parsed = JSON.parse(raw);
          const base = defaultState();
          return {
            ...base,
            ...parsed,
            filters: { ...base.filters, ...(parsed.filters || {}) },
            profile: { ...base.profile, ...(parsed.profile || {}) }
          };
        } catch (error) {
          return defaultState();
        }
      }

      const state = loadState();

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function showToast(message) {
        const el = document.createElement("div");
        el.className = "toast";
        el.textContent = message;
        toastRoot.appendChild(el);
        setTimeout(() => el.remove(), 1800);
      }

      function getListing(id) {
        return listings.find((item) => item.id === id) || listings[0];
      }

      function setView(view) {
        state.view = view;
        saveState();
        render();
      }

      function cycleFilter(key) {
        const options = {
          area: ["All", "Lekki", "Abuja", "Yaba"],
          type: ["Any", "Studio", "2 Beds", "Shared"],
          price: ["Any", "Low", "Mid", "High"]
        }[key];
        const current = options.indexOf(state.filters[key]);
        state.filters[key] = options[(current + 1) % options.length];
        saveState();
        render();
      }

      function filteredListings() {
        return listings.filter((listing) => {
          const q = state.search.trim().toLowerCase();
          const bySearch =
            !q ||
            listing.title.toLowerCase().includes(q) ||
            listing.location.toLowerCase().includes(q) ||
            listing.area.toLowerCase().includes(q);
          const byArea = state.filters.area === "All" || listing.area === state.filters.area;
          const byType = state.filters.type === "Any" || listing.type === state.filters.type;
          const byPrice = state.filters.price === "Any" || listing.priceBand === state.filters.price;
          return bySearch && byArea && byType && byPrice;
        });
      }

      function toggleSave(id) {
        const index = state.savedIds.indexOf(id);
        if (index >= 0) {
          state.savedIds.splice(index, 1);
          showToast("Removed from saved homes");
        } else {
          state.savedIds.push(id);
          showToast("Saved to dashboard");
        }
        saveState();
        render();
      }

      function bookListing(id) {
        if (state.bookings.some((item) => item.listingId === id)) {
          showToast("Viewing already scheduled");
          return;
        }
        state.bookings.unshift({
          id: "b" + (state.bookings.length + 1),
          listingId: id,
          slot: "Tue, 21 May - 1:30 PM",
          status: "Pending"
        });
        saveState();
        showToast("Viewing booked");
        setView("student");
      }

      function toggleMatch(id) {
        const index = state.requestedMatches.indexOf(id);
        if (index >= 0) {
          state.requestedMatches.splice(index, 1);
          showToast("Match request withdrawn");
        } else {
          state.requestedMatches.push(id);
          showToast("Match request sent");
        }
        saveState();
        render();
      }

      function selectListing(id) {
        state.selectedListingId = id;
        saveState();
        setView("details");
      }

      function renderLogin() {
        return `
          <section class="auth-shell">
            <div class="auth-visual pattern">
              <span class="eyebrow">Member Portal</span>
              <h1 class="hero-title">Sovereign Living for the Modern Scholar.</h1>
              <p>
                This screen now reflects the zip's editorial login direction, with the same
                warm prestige palette, bold type, and premium housing positioning.
              </p>
              <div class="hero-actions">
                <button class="solid-btn" data-go="listings">Explore Listings</button>
                <button class="ghost-btn" data-go="student">Open Dashboard</button>
              </div>
              <img
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBOL_yDqDegHECC0xmryUeuMZUCtJ26INSm5Aag3TJl4V0LOr4BAGZpR7ByR2jT73UALzkGAAjqlHfDzVw1PSGmxuSAO7BCjXWMrZoAtBAvbh2V75iERWrEGTpcUhFZ_ZnXX4_6-G0wnMcF1XjiUjgk9L6egL8z1mwUOjBPMIRuseG9uMfxj-xFSX6zmIPMWU11-HTJeEd2DZ--w_WySWk9DpABdrADJHoQGIeENoP6UfrgHJOl9LMW9aaCOj6lqdlvcPtkxq77XdPn"
                alt="Editorial student portrait"
              />
            </div>
            <div class="auth-card">
              <span class="badge warm">Welcome Back</span>
              <h2 class="screen-title" style="margin-top: 14px;">Access Your Curated Space</h2>
              <p class="muted">Use the demo shell to move between the zip screens from one page.</p>
              <div class="form-stack">
                <div>
                  <label class="auth-label" for="login-email">Email Address</label>
                  <div class="auth-input">
                    <span class="material-symbols-outlined">mail</span>
                    <input id="login-email" class="auth-field" value="korede@example.com" />
                  </div>
                </div>
                <div>
                  <label class="auth-label" for="login-password">Password</label>
                  <div class="auth-input">
                    <span class="material-symbols-outlined">lock</span>
                    <input id="login-password" class="auth-field" type="password" value="password123" />
                  </div>
                </div>
                <button class="solid-btn" data-go="student">Login to Dashboard</button>
              </div>
            </div>
          </section>
        `;
      }

      function renderListings() {
        const items = filteredListings();
        return `
          <section class="hero-grid">
            <div class="hero-copy pattern">
              <span class="eyebrow">Listing Page</span>
              <h1 class="hero-title">Curated Living for the <span style="color: var(--gold);">Sovereign Scholar.</span></h1>
              <p>
                This view implements the zip's premium listing experience with search, filters,
                verified property cards, and direct actions into details or booking flows.
              </p>
              <div class="hero-actions">
                <button class="solid-btn" data-go="details">Open Featured Home</button>
                <button class="ghost-btn" data-go="landlord">See Landlord Side</button>
              </div>
            </div>
            <div class="hero-stage">
              <div class="sheet search-shell">
                <label class="search-row">
                  <span class="material-symbols-outlined muted">search</span>
                  <input id="search-input" value="${state.search}" placeholder="Search Lekki, Abuja, Yaba..." />
                </label>
                <div class="chips">
                  <button class="chip ${state.filters.area !== "All" ? "active" : ""}" data-filter="area">Area: ${state.filters.area}</button>
                  <button class="chip ${state.filters.type !== "Any" ? "active" : ""}" data-filter="type">Type: ${state.filters.type}</button>
                  <button class="chip ${state.filters.price !== "Any" ? "active" : ""}" data-filter="price">Price: ${state.filters.price}</button>
                </div>
                <div class="meta-row">
                  <span class="badge ok">${items.length} result${items.length === 1 ? "" : "s"}</span>
                  <span class="muted">Built from the zip screens into a single working shell.</span>
                </div>
              </div>
            </div>
          </section>
          <section style="margin-top: 22px;">
            <div class="cards-grid">
              ${items.map((listing) => {
                const saved = state.savedIds.includes(listing.id);
                return `
                  <article class="card">
                    <div class="card-media">
                      <img src="${listing.image}" alt="${listing.title}" />
                      <div style="position:absolute;top:14px;left:14px;">
                        <span class="badge gold">
                          <span class="material-symbols-outlined" style="font-size: 14px; font-variation-settings: 'FILL' 1;">verified</span>
                          Verified
                        </span>
                      </div>
                      <div class="price-tag">${listing.priceLabel}</div>
                    </div>
                    <div class="card-body">
                      <h3 class="card-title">${listing.title}</h3>
                      <div class="meta-row muted">
                        <span class="material-symbols-outlined" style="font-size: 18px;">location_on</span>
                        ${listing.location}
                      </div>
                      <div class="facts">
                        ${listing.features.map((feature) => `<span class="fact">${feature}</span>`).join("")}
                      </div>
                      <div class="card-actions">
                        <button class="ghost-btn" data-save="${listing.id}">${saved ? "Saved" : "Save"}</button>
                        <button class="soft-btn" data-open="${listing.id}">Details</button>
                        <button class="solid-btn" data-book="${listing.id}">Book Viewing</button>
                      </div>
                    </div>
                  </article>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }

      function renderDetails() {
        const listing = getListing(state.selectedListingId);
        return `
          <section class="split-grid">
            <div>
              <div class="gallery-main card">
                <img src="${listing.gallery[0]}" alt="${listing.title}" />
              </div>
            </div>
            <div class="gallery-stack">
              <div class="gallery-thumb card"><img src="${listing.gallery[1]}" alt="${listing.title} secondary" /></div>
              <div class="gallery-thumb card"><img src="${listing.gallery[2]}" alt="${listing.title} third" /></div>
            </div>
          </section>
          <section class="detail-grid" style="margin-top: 22px;">
            <div class="panel" style="grid-column: span 8;">
              <div class="meta-row">
                <span class="badge gold">Verified Property</span>
                <span class="badge ok">${listing.spots} spots remaining</span>
              </div>
              <h1 class="screen-title" style="margin-top: 12px;">${listing.title}</h1>
              <p class="muted">${listing.location}</p>
              <div class="stats-grid" style="margin-top: 18px;">
                <div class="stat"><strong>${listing.features[0]}</strong><div class="muted">Layout</div></div>
                <div class="stat"><strong>${listing.features[1]}</strong><div class="muted">Comfort</div></div>
                <div class="stat"><strong>${listing.features[2]}</strong><div class="muted">Infrastructure</div></div>
              </div>
              <p style="line-height: 1.75; margin-top: 18px;">${listing.description}</p>
              <div class="card-actions">
                <button class="solid-btn" data-book="${listing.id}">Book Viewing</button>
                <button class="ghost-btn" data-save="${listing.id}">${state.savedIds.includes(listing.id) ? "Saved" : "Save Home"}</button>
                <button class="soft-btn" data-go="student">See Student Dashboard</button>
              </div>
            </div>
            <aside class="panel" style="grid-column: span 4;">
              <span class="badge warm">Roommate Matching</span>
              <h2 class="section-title" style="margin-top: 14px;">Potential Matches</h2>
              <div class="list-stack" style="margin-top: 16px;">
                ${roommates.map((mate) => `
                  <div class="match-card">
                    <strong>${mate.name}</strong>
                    <div class="muted">${mate.school}</div>
                    <div class="muted" style="margin-top: 8px;">${mate.note}</div>
                    <div class="card-actions" style="margin-top: 12px;">
                      <span class="badge ok">${mate.match}% Match</span>
                      <button class="ghost-btn" data-match="${mate.id}">
                        ${state.requestedMatches.includes(mate.id) ? "Withdraw" : "Request"}
                      </button>
                    </div>
                  </div>
                `).join("")}
              </div>
            </aside>
          </section>
        `;
      }

      function renderStudent() {
        return `
          <section class="dashboard-grid">
            <div class="dashboard-main">
              <div class="panel pattern" style="background: linear-gradient(135deg, var(--primary-2) 0%, var(--primary) 100%); color: #fff;">
                <span class="eyebrow">Student Dashboard</span>
                <h1 class="screen-title" style="margin-top: 14px;">Welcome back, ${state.profile.name.split(" ")[0]}.</h1>
                <p style="max-width: 36rem; color: rgba(255,255,255,0.76); line-height: 1.7;">
                  Your zip-based student dashboard is now live here with saved homes, active bookings,
                  and roommate actions unified in one flow.
                </p>
              </div>
              <div class="stat-band">
                <div class="stat">
                  <div class="muted">Saved Houses</div>
                  <h2 class="section-title">${state.savedIds.length}</h2>
                </div>
                <div class="stat">
                  <div class="muted">Active Bookings</div>
                  <h2 class="section-title">${state.bookings.length}</h2>
                </div>
                <div class="stat">
                  <div class="muted">Match Requests</div>
                  <h2 class="section-title">${state.requestedMatches.length}</h2>
                </div>
              </div>
              <div class="panel">
                <div class="meta-row" style="justify-content: space-between;">
                  <h2 class="section-title">My Applications & Viewings</h2>
                  <button class="ghost-btn" data-go="listings">Browse More Homes</button>
                </div>
                <div class="list-stack" style="margin-top: 16px;">
                  ${state.bookings.map((booking) => {
                    const listing = getListing(booking.listingId);
                    return `
                      <div class="booking-card">
                        <strong>${listing.title}</strong>
                        <div class="muted">${listing.location}</div>
                        <div class="meta-row" style="margin-top: 10px;">
                          <span class="badge warm">${booking.status}</span>
                          <span class="muted">${booking.slot}</span>
                        </div>
                      </div>
                    `;
                  }).join("")}
                </div>
              </div>
            </div>
            <aside class="dashboard-side">
              <div class="panel">
                <h2 class="section-title">Saved Homes</h2>
                <div class="list-stack" style="margin-top: 16px;">
                  ${state.savedIds.map((id) => {
                    const home = getListing(id);
                    return `
                      <div class="list-row">
                        <strong>${home.title}</strong>
                        <div class="muted">${home.location}</div>
                        <div class="card-actions" style="margin-top: 12px;">
                          <button class="ghost-btn" data-open="${home.id}">Open</button>
                          <button class="soft-btn" data-save="${home.id}">Remove</button>
                        </div>
                      </div>
                    `;
                  }).join("") || `<div class="list-row muted">No saved homes yet.</div>`}
                </div>
              </div>
              <div class="panel">
                <h2 class="section-title">Profile Snapshot</h2>
                <div class="list-stack" style="margin-top: 16px;">
                  <div class="list-row"><strong>${state.profile.school}</strong><div class="muted">${state.profile.track}</div></div>
                  <div class="list-row"><strong>Preferred Area</strong><div class="muted">${state.profile.area}</div></div>
                  <div class="list-row"><strong>Budget</strong><div class="muted">${state.profile.budget}</div></div>
                </div>
              </div>
            </aside>
          </section>
        `;
      }

      function renderLandlord() {
        return `
          <section class="landlord-grid">
            <div class="landlord-main">
              <div class="panel pattern" style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%); color: #fff;">
                <span class="eyebrow">Landlord Portal</span>
                <h1 class="screen-title" style="margin-top: 14px;">Welcome back, Adebayo.</h1>
                <p style="max-width: 38rem; color: rgba(255,255,255,0.76); line-height: 1.7;">
                  This view brings the landlord zip screens into the app with earnings, occupancy,
                  inquiries, and a portfolio overview.
                </p>
              </div>
              <div class="stat-band">
                <div class="stat">
                  <div class="muted">Total Earnings</div>
                  <h2 class="section-title">NGN 12.4M</h2>
                </div>
                <div class="stat">
                  <div class="muted">Occupancy Rate</div>
                  <h2 class="section-title">94%</h2>
                </div>
                <div class="stat">
                  <div class="muted">Active Inquiries</div>
                  <h2 class="section-title">08</h2>
                </div>
              </div>
              <div class="panel">
                <div class="meta-row" style="justify-content: space-between;">
                  <h2 class="section-title">Portfolio Overview</h2>
                  <button class="soft-btn">List New Property</button>
                </div>
                <div class="list-stack" style="margin-top: 16px;">
                  ${listings.map((listing, index) => `
                    <div class="property-row">
                      <img src="${listing.image}" alt="${listing.title}" />
                      <div>
                        <div class="meta-row" style="justify-content: space-between;">
                          <strong style="font-size: 1.1rem;">${listing.title}</strong>
                          <span class="badge ${index % 2 === 0 ? "ok" : "warm"}">${index % 2 === 0 ? "Matched" : "Looking"}</span>
                        </div>
                        <div class="muted">${listing.location}</div>
                        <div class="facts" style="margin-top: 12px;">
                          <span class="fact">${listing.type}</span>
                          <span class="fact">${listing.priceLabel}</span>
                          <span class="fact">${listing.spots} spots left</span>
                        </div>
                        <div class="card-actions" style="margin-top: 14px;">
                          <button class="ghost-btn" data-open="${listing.id}">View Listing</button>
                          <button class="solid-btn">Manage Tenants</button>
                        </div>
                      </div>
                    </div>
                  `).join("")}
                </div>
              </div>
            </div>
            <aside class="landlord-side">
              <div class="panel">
                <h2 class="section-title">Student Inquiries</h2>
                <div class="list-stack" style="margin-top: 16px;">
                  ${roommates.map((mate) => `
                    <div class="list-row">
                      <strong>${mate.name}</strong>
                      <div class="muted">${mate.school}</div>
                      <div class="card-actions" style="margin-top: 12px;">
                        <span class="badge ok">${mate.match}% Fit</span>
                        <button class="ghost-btn">Review</button>
                      </div>
                    </div>
                  `).join("")}
                </div>
              </div>
              <div class="panel">
                <h2 class="section-title">Quick Notes</h2>
                <div class="list-stack" style="margin-top: 16px;">
                  <div class="list-row">3 new viewing requests arrived today.</div>
                  <div class="list-row">Lekki inventory is outperforming last semester by 12%.</div>
                  <div class="list-row">One Abuja unit is waiting for updated amenities photos.</div>
                </div>
              </div>
            </aside>
          </section>
        `;
      }

      function render() {
        navButtons.forEach((button) => button.classList.toggle("active", button.dataset.view === state.view));
        if (state.view === "login") pageHost.innerHTML = renderLogin();
        if (state.view === "listings") pageHost.innerHTML = renderListings();
        if (state.view === "details") pageHost.innerHTML = renderDetails();
        if (state.view === "student") pageHost.innerHTML = renderStudent();
        if (state.view === "landlord") pageHost.innerHTML = renderLandlord();
      }

      document.addEventListener("click", (event) => {
        const viewButton = event.target.closest("[data-view]");
        if (viewButton) {
          setView(viewButton.dataset.view);
          return;
        }

        const goButton = event.target.closest("[data-go]");
        if (goButton) {
          setView(goButton.dataset.go);
          return;
        }

        const filterButton = event.target.closest("[data-filter]");
        if (filterButton) {
          cycleFilter(filterButton.dataset.filter);
          return;
        }

        const saveButton = event.target.closest("[data-save]");
        if (saveButton) {
          toggleSave(saveButton.dataset.save);
          return;
        }

        const bookButton = event.target.closest("[data-book]");
        if (bookButton) {
          bookListing(bookButton.dataset.book);
          return;
        }

        const openButton = event.target.closest("[data-open]");
        if (openButton) {
          selectListing(openButton.dataset.open);
          return;
        }

        const matchButton = event.target.closest("[data-match]");
        if (matchButton) {
          toggleMatch(matchButton.dataset.match);
        }
      });

      document.addEventListener("input", (event) => {
        if (event.target.id === "search-input") {
          state.search = event.target.value;
          saveState();
          render();
        }
      });

      render();
    </script>
  </body>
</html>
